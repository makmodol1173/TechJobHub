{% load static %}

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechJobHub</title>
    <link rel="stylesheet" href="{% static 'css/F2.css' %}" />
    <script src="{% static 'js/F2.js' %}" defer></script>
  </head>
  <body>
    <div class="overlay">
      <div class="header">
        <img src="{% static 'images/logo.png' %}" alt="TechJobHub Logo" class="logo" />
        <h1 class="title">TechJobHub</h1>
      </div>
      <div class="container">
        <div class="content">
          <h2 class="main-heading">TECHJOBHUB</h2>
          <p class="description">
            welcome to our project
          </p>
        </div>
        <div class="sign-in-form">
          <div class="form-header">
            <h3>Sign In &nbsp</h3>
            <p>Don't have an account? <a href="{% url 'F3' %}">Sign Up</a></p>
          </div>
          <form class="form">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" />
            <label for="email">Email</label>
            <input type="email" id="email" name="email" />
            <label for="password">Password</label>
            <input type="password" id="password" name="password" />
            <button type="submit" class="sign-in-btn">Sign In</button>
          </form>
          <a href="{% url 'F4' %}" class="forgot-password">Forgot Password?</a>
        </div>
      </div>
    </div>
  </body>
</html>
